<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlyerStats - Track Any Flight Globally</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#0ea5e9;--primary-glow:rgba(14,165,233,.5);--bg-dark:#0f172a;--glass:rgba(30,41,59,.7);--border:rgba(255,255,255,.1);--text:#f8fafc}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text);overflow:hidden;height:100vh;width:100vw}
#map{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
.search-overlay{position:absolute;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:center;align-items:flex-start;padding-top:3rem;transition:opacity .5s ease}
.search-container{width:100%;max-width:600px;text-align:center}
.hero-text{margin-bottom:1.5rem;opacity:0;animation:fadeInDown 1s ease forwards}
.hero-text h1{font-size:3rem;font-weight:700;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.hero-text p{color:#94a3b8;font-size:1.1rem}
.input-group{position:relative;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:.5rem;display:flex;align-items:center;box-shadow:0 20px 40px rgba(0,0,0,.4);transition:all .3s ease}
.input-group:focus-within{border-color:var(--primary);box-shadow:0 0 30px var(--primary-glow)}
.plane-icon-lg{font-size:1.5rem;margin-left:1rem;color:var(--primary)}
input{flex:1;background:transparent;border:none;padding:1rem;font-size:1.25rem;color:white;outline:none;font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:1px}
input::placeholder{color:rgba(255,255,255,.4);font-size:1rem}
.loader-inline{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;display:none;margin-right:1rem}
.loader-inline.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.tracker-ui{position:fixed;top:2rem;left:50%;transform:translateX(-50%) translateY(-150%);z-index:1000;width:100%;max-width:800px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;padding:1.5rem;display:flex;justify-content:space-between;align-items:center;box-shadow:0 10px 40px rgba(0,0,0,.5);transition:transform .6s cubic-bezier(.175,.885,.32,1.27);flex-wrap:wrap;gap:1rem}
.tracker-ui.visible{transform:translateX(-50%) translateY(0)}
.flight-info{display:flex;gap:2rem;align-items:center}
.flight-code{font-size:2rem;font-weight:700;color:white}
.route-badge{background:rgba(14,165,233,.2);color:var(--primary);padding:.5rem 1rem;border-radius:8px;font-weight:600;font-size:.9rem}
.status-dot{width:10px;height:10px;background:#10b981;border-radius:50%;box-shadow:0 0 10px #10b981;animation:pulse 1.5s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
.close-btn{background:transparent;border:none;color:#94a3b8;font-size:1.5rem;cursor:pointer;transition:color .2s}
.close-btn:hover{color:white}
.error-message{position:absolute;top:100%;left:0;right:0;color:#ef4444;font-size:.875rem;margin-top:.5rem;text-align:center;opacity:0;transition:opacity .3s ease}
.error-message.show{opacity:1}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.eta-container{background:linear-gradient(135deg,rgba(14,165,233,.1),rgba(139,92,246,.1));padding:1rem;border-radius:12px;margin:.5rem 0;border:1px solid rgba(255,255,255,.05);width:100%}
.eta-label{font-size:.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:1px}
.eta-time{font-size:1.5rem;font-weight:700;color:#fff;margin:.25rem 0}
.countdown{font-size:.9rem;color:#94a3b8}
.countdown.landing-soon{color:#f59e0b;font-weight:600}
.countdown.landed{color:#10b981;font-weight:600;text-transform:uppercase}
.data-status{display:flex;align-items:center;gap:.5rem;font-size:.75rem;margin-top:.5rem}
.status-dot-live{width:6px;height:6px;background:#10b981;border-radius:50%;box-shadow:0 0 6px #10b981;animation:statusPulse 1.5s infinite}
.status-dot-warning{background:#f59e0b;box-shadow:0 0 6px #f59e0b}
.status-dot-offline{background:#ef4444;box-shadow:0 0 6px #ef4444}
@keyframes statusPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}}
.animated-plane-marker{filter:drop-shadow(0 0 15px rgba(14,165,233,.8))}
#offlineBadge{display:none;position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:#f59e0b;color:white;padding:.5rem 1rem;border-radius:20px;font-size:.85rem;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.plane-popup .leaflet-popup-content-wrapper{background:#1e293b;color:#f8fafc;border-radius:12px;border:1px solid rgba(14,165,233,.3);box-shadow:0 10px 30px rgba(0,0,0,.5)}
.plane-popup .leaflet-popup-tip{background:#1e293b}
.popup-content{padding:1.25rem;min-width:220px}
.popup-header{font-size:1.1rem;font-weight:700;color:#0ea5e9;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.popup-row{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem}
.popup-row:last-child{border-bottom:none}
.popup-label{color:#94a3b8}
.popup-value{color:#f8fafc;font-weight:600}
@media(max-width:768px){.hero-text h1{font-size:2rem}.tracker-ui{flex-direction:column;gap:.5rem;align-items:flex-start;padding:1rem}.flight-code{font-size:1.5rem}}
</style>
</head>
<body>
<div id="map"></div>
<div class="search-overlay" id="searchOverlay"><div class="search-container"><div class="hero-text"><h1>FlyerStats</h1><p>Enter a flight number to track it globally.</p></div><div class="input-group"><span class="plane-icon-lg">✈️</span><input type="text" id="flightInput" placeholder="e.g. SQ321, BA117" autocomplete="off"><div class="loader-inline" id="loader"></div></div><div class="error-message" id="errorMessage">Flight not found.</div></div></div>
<div class="tracker-ui" id="trackerUI"><div class="status-dot"></div><div class="flight-info"><div class="flight-code" id="uiFlightCode">---</div><div class="route-badge" id="uiRoute">--- ➔ ---</div></div><div class="eta-container"><div class="eta-label">Estimated Arrival</div><div class="eta-time" id="etaTime">--:--</div><div class="countdown" id="countdown">Waiting...</div><div class="data-status"><div class="status-dot-live"></div><span id="dataFreshness">Connecting...</span></div></div><div style="display:flex;gap:.5rem;align-items:center;"><button onclick="shareFlight()" style="background:rgba(14,165,233,.2);color:#0ea5e9;border:none;padding:.5rem 1rem;border-radius:8px;font-weight:600;cursor:pointer;font-size:.85rem">🔗 Copy Link</button><button onclick="shareWhatsApp()" style="background:rgba(37,211,102,.2);color:#25d366;border:none;padding:.5rem 1rem;border-radius:8px;font-weight:600;cursor:pointer;font-size:.85rem">💬 WhatsApp</button><button class="close-btn" onclick="resetSearch()">✕</button></div></div>
<div id="offlineBadge">⚠️ Offline – Showing estimated position</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map',{zoomControl:false,attributionControl:false,preferCanvas:true}).setView([20,0],2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd',attribution:''}).addTo(map);

let planeMarker=null;let pollTimer=null;let animationFrame=null;let currentFlightNum=null;
let currentPlaneData=null;let lastFetchTime=0;let fetchInterval=300000;
let isPageVisible=document.visibilityState==='visible';let isOnline=navigator.onLine;
let etaTimer=null;let currentEta=null;let isFlightLanded=false;let drTimer=null;
let planePopup=null;

const flightInput=document.getElementById('flightInput');
const loader=document.getElementById('loader');
const errorMessage=document.getElementById('errorMessage');
const searchOverlay=document.getElementById('searchOverlay');
const trackerUI=document.getElementById('trackerUI');
const offlineBadge=document.getElementById('offlineBadge');

const FLIGHT_DB={
  'SQ321':{origin:{code:'SIN',lat:1.3644,lon:103.9915},dest:{code:'LHR',lat:51.4700,lon:-0.4543},status:'in_air',eta:new Date(Date.now()+28800000).toISOString(),currentLat:28.6139,currentLon:77.2090,altitude_ft:38000,velocity_kt:480,heading_deg:315},
  'BA117':{origin:{code:'LHR',lat:51.4700,lon:-0.4543},dest:{code:'JFK',lat:40.6413,lon:-73.7781},status:'in_air',eta:new Date(Date.now()+21600000).toISOString(),currentLat:51.5,currentLon:-30.0,altitude_ft:41000,velocity_kt:520,heading_deg:270}
};

function showToast(msg,type='info'){
  const toast=document.createElement('div');
  toast.style.cssText=`position:fixed;bottom:4rem;left:50%;transform:translateX(-50%);background:${type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'};color:white;padding:.75rem 1.5rem;border-radius:10px;font-size:.875rem;z-index:10000;opacity:0;transition:opacity .3s;`;
  toast.textContent=msg;document.body.appendChild(toast);
  setTimeout(()=>toast.style.opacity='1',10);
  setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),300)},4000);
}

function shareFlight(){navigator.clipboard.writeText(window.location.href).then(()=>showToast('✈️ Flight link copied!','success')).catch(()=>showToast('Failed to copy','error'));}
function shareWhatsApp(){const url=encodeURIComponent(window.location.href);window.open(`https://wa.me/?text=${encodeURIComponent('Track this flight:')}%20${url}`,'_blank');}

async function fetchFlightData(fnum){
  const r=await fetch(`/api/flights/${fnum}`);
  if(!r.ok)throw new Error('API failed');
  return await r.json();
}

async function fetchData(){
  if(!shouldFetchNewData()){scheduleNextFetch();return;}
  try{
    const data=await fetchFlightData(currentFlightNum);
    currentPlaneData=data;lastFetchTime=Date.now();
    const flight=data.flights?.[0];
    if(flight){updateMapPosition(flight);if(flight.estimated_arrival_time)startETACountdown(flight.estimated_arrival_time);updateDataFreshness();updatePopup(flight);}
    scheduleNextFetch();
  }catch(e){console.warn('Fetch failed:',e);if(!navigator.onLine&&currentPlaneData)activateDeadReckoning();pollTimer=setTimeout(fetchData,60000);}
}

function shouldFetchNewData(){if(!currentPlaneData)return true;return(Date.now()-lastFetchTime)>fetchInterval;}
function scheduleNextFetch(){if(pollTimer)clearTimeout(pollTimer);const rem=Math.max(0,fetchInterval-(Date.now()-lastFetchTime));pollTimer=setTimeout(fetchData,rem);}

function startSmoothAnimation(){
  if(!isPageVisible){animationFrame=setTimeout(startSmoothAnimation,1000);return;}
  if(currentPlaneData?.flights?.[0]&&planeMarker&&!isFlightLanded){
    const flight=currentPlaneData.flights[0];
    const vel=flight.velocity_kt||0;const hdg=flight.heading_deg||0;
    const lf=planeMarker.getLatLng();
    const wob=Math.sin(Date.now()/1000)*(vel/10000);
    planeMarker.setLatLng([lf.lat+Math.sin(hdg*Math.PI/180)*wob*.0001,lf.lng+Math.cos(hdg*Math.PI/180)*wob*.0001]);
    updatePopupHeading(flight);
  }
  animationFrame=setTimeout(startSmoothAnimation,100);
}

function startETACountdown(etasString){
  if(etaTimer)setInterval(etaTimer);
  currentEta=new Date(etasString);isFlightLanded=false;updateCountdown();
  etaTimer=setInterval(updateCountdown,1000);
}

function updateCountdown(){
  if(!currentEta)return;
  const diff=currentEta-Date.now();
  const cdEl=document.getElementById('countdown');const etaEl=document.getElementById('etaTime');
  etaEl.textContent=currentEta.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  if(diff<=0){isFlightLanded=true;cdEl.innerHTML='<span class="countdown landed">✈️ Landed!</span>';clearInterval(etaTimer);return;}
  const hrs=Math.floor(diff/3600000);const mins=Math.floor((diff%3600000)/60000);const secs=Math.floor((diff%60000)/1000);
  let txt=hrs>0?`${hrs}h `:'';txt+=mins>0?`${mins}m `:'';txt+=`${secs}s`;
  cdEl.textContent=hrs===0&&mins<30?`⚠️ Landing in ${mins}m ${secs}s!`:txt;
  cdEl.classList.toggle('landing-soon',hrs===0&&mins<30);
}

function updateDataFreshness(){
  const el=document.getElementById('dataFreshness');const dot=document.querySelector('.status-dot-live');
  if(!lastFetchTime){el.textContent='Loading...';return;}
  const ageSec=Math.floor((Date.now()-lastFetchTime)/1000);
  const ageMin=Math.floor(ageSec/60);
  el.textContent=ageSec<60?'Updated just now':`Updated ${ageMin}m ago`;
  el.style.color=ageSec<60?'#10b981':ageSec<300?'#f59e0b':'#94a3b8';
  dot.className=ageSec<60?'status-dot-live':ageSec<300?'status-dot-warning':'status-dot-offline';
}
setInterval(updateDataFreshness,10000);

function activateDeadReckoning(){
  if(!currentPlaneData?.flights?.[0])return;
  const f=currentPlaneData.flights[0];
  const spd=f.velocity_kt||450;const hdg=f.heading_deg||0;
  offlineBadge.style.display='block';
  if(drTimer)setInterval(drTimer);
  drTimer=setInterval(()=>{
    if(!isPageVisible||isFlightLanded)return;
    const drift=(spd/10000)*Math.sin(Date.now()/1000);
    const lf=planeMarker.getLatLng();
    planeMarker.setLatLng([lf.lat+Math.sin(hdg*Math.PI/180)*drift*.0001,lf.lng+Math.cos(hdg*Math.PI/180)*drift*.0001]);
  },5000);
}
function stopDeadReckoning(){if(drTimer)setInterval(drTimer);drTimer=null;offlineBadge.style.display='none';}
window.addEventListener('online',()=>{isOnline=true;stopDeadReckoning();showToast('✅ Online!','success');if(currentFlightNum){lastFetchTime=0;fetchData();}});
window.addEventListener('offline',()=>{isOnline=false;showToast('⚠️ Offline','warning');if(currentPlaneData&&!isFlightLanded)activateDeadReckoning();});

function createPlaneIcon(lat,lng,hdg=0,alt=0){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="48" height="48" style="transform:rotate(${hdg}deg);"><path fill="#0ea5e9" d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>`;
  return L.divIcon({className:'animated-plane-marker',html:`<div style="position:relative;"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;background:radial-gradient(circle,rgba(14,165,233,.4) 0%,transparent 70%);border-radius:50%;animation:pulse 2s infinite;"></div>${svg}</div>`,iconSize:[48,48],iconAnchor:[24,24]});
}

function updateMapPosition(flight){
  const latLng=[flight.latitude||flight.currentLat||20,flight.longitude||flight.currentLon||0];
  const hdg=flight.heading_deg||0;
  const icon=createPlaneIcon(latLng[0],latLng[1],hdg);
  if(!planeMarker){
    planeMarker=L.marker(latLng,{icon}).addTo(map);
    planeMarker.bindTooltip('<i>Click for details</i>',{permanent:false,direction:'top',offset:[0,-10]});
    planeMarker.on('click',()=>showPopup());
  }else{
    planeMarker.setLatLng(latLng);
    planeMarker.setIcon(icon);
  }
  map.panTo(latLng,{animate:true,duration:.5});
}

function updatePopup(flight){
  if(planePopup){
    const html=`<div class="popup-content"><div class="popup-header">✈️ ${currentFlightNum}</div>
      <div class="popup-row"><span class="popup-label">Altitude</span><span class="popup-value">${(flight.altitude_ft||0).toLocaleString()} ft</span></div>
      <div class="popup-row"><span class="popup-label">Speed</span><span class="popup-value">${flight.velocity_kt||0} kts</span></div>
      <div class="popup-row"><span class="popup-label">Heading</span><span class="popup-value">${(flight.heading_deg||0)+'°'}</span></div>
      <div class="popup-row"><span class="popup-label">Origin</span><span class="popup-value">${flight.origin_airport||'---'}</span></div>
      <div class="popup-row"><span class="popup-label">Destination</span><span class="popup-value">${flight.destination_airport||'---'}</span></div>
      <div class="popup-row"><span class="popup-label">ETA</span><span class="popup-value">${flight.estimated_arrival_time?new Date(flight.estimated_arrival_time).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'---'}</span></div></div>`;
    planePopup.setContent(html);
  }
}

function updatePopupHeading(flight){if(planePopup&&planePopup.isOpen())updatePopup(flight);}

function showPopup(){if(planeMarker&&currentPlaneData?.flights?.[0]){planePopup=planeMarker.bindPopup(createPopupContent(currentPlaneData.flights[0])).openPopup();}}
function createPopupContent(f){
  return `<div class="popup-content"><div class="popup-header">✈️ ${currentFlightNum}</div>
    <div class="popup-row"><span class="popup-label">Altitude</span><span class="popup-value">${(f.altitude_ft||0).toLocaleString()} ft</span></div>
    <div class="popup-row"><span class="popup-label">Speed</span><span class="popup-value">${f.velocity_kt||0} kts</span></div>
    <div class="popup-row"><span class="popup-label">Heading</span><span class="popup-value">${(f.heading_deg||0)+'°'}</span></div>
    <div class="popup-row"><span class="popup-label">Origin</span><span class="popup-value">${f.origin_airport||'---'}</span></div>
    <div class="popup-row"><span class="popup-label">Destination</span><span class="popup-value">${f.destination_airport||'---'}</span></div>
    <div class="popup-row"><span class="popup-label">ETA</span><span class="popup-value">${f.estimated_arrival_time?new Date(f.estimated_arrival_time).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'---'}</span></div></div>`;
}

function updateURL(fnum){const u=`${window.location.origin}/track/${fnum}`;window.history.pushState({},'',u);}

function successAction(fnum,fdata){
  currentFlightNum=fnum;currentPlaneData={flights:[fdata]};lastFetchTime=Date.now();
  searchOverlay.style.opacity='0';searchOverlay.style.pointerEvents='none';
  document.getElementById('uiFlightCode').textContent=fnum;
  document.getElementById('uiRoute').textContent=`${fdata.origin.code} ➔ ${fdata.dest.code}`;
  updateURL(fnum);
  map.flyTo([fdata.origin.lat,fdata.origin.lon],8,{duration:2.5});
  setTimeout(()=>{trackerUI.classList.add('visible');updateMapPosition(fdata);startETACountdown(fdata.eta);fetchData();startSmoothAnimation();},2500);
}

function resetSearch(){
  if(pollTimer)clearTimeout(pollTimer);if(animationFrame)clearTimeout(animationFrame);
  if(etaTimer)clearInterval(etaTimer);stopDeadReckoning();
  if(planePopup&&planePopup.isOpen())planePopup.close();
  if(planeMarker)map.removeLayer(planeMarker);
  planeMarker=null;currentPlaneData=null;isFlightLanded=false;
  trackerUI.classList.remove('visible');searchOverlay.style.opacity='1';searchOverlay.style.pointerEvents='all';
  map.flyTo([20,0],2,{duration:1.5});
  setTimeout(()=>{flightInput.value='';document.getElementById('uiFlightCode').textContent='---';document.getElementById('uiRoute').textContent='--- ➔ ---'},1500);
  window.history.pushState({},"",window.location.origin);
}

function showError(msg){errorMessage.textContent=msg;errorMessage.classList.add('show');setTimeout(()=>errorMessage.classList.remove('show'),3000);}

function loadFlightFromURL(){
  const paths=window.location.pathname.split('/');
  const fnum=paths[paths.length-1];
  if(fnum&&/^[A-Z0-9]{2,6}$/i.test(fnum)){
    const fn=fnum.toUpperCase();
    flightInput.value=fn;loader.classList.add('show');
    fetchFlightData(fn).then(d=>{const f=d.flights?.[0];if(f){successAction(fn,{origin:{code:f.origin_airport||'---',lat:f.latitude||1.36,lon:f.longitude||103.99},dest:{code:f.destination_airport||'---'},status:f.status||'in_air',eta:f.estimated_arrival_time||new Date(Date.now()+28800000).toISOString(),currentLat:f.latitude,currentLon:f.longitude,altitude_ft:f.altitude_ft,velocity_kt:f.velocity_kt,heading_deg:f.heading_deg});}else{loader.classList.remove('show');}}).catch(()=>loader.classList.remove('show'));
  }
}

flightInput.addEventListener('keypress',async e=>{
  if(e.key!=='Enter')return;
  const fn=e.target.value.trim().toUpperCase();
  if(!/^[A-Z0-9]{2,6}$/.test(fn))return showError('Invalid format');
  loader.classList.add('show');
  try{const d=await fetchFlightData(fn);const f=d.flights?.[0];
    if(f){successAction(fn,{origin:{code:f.origin_airport||'---',lat:f.latitude||1.36,lon:f.longitude||103.99},dest:{code:f.destination_airport||'---'},status:f.status||'in_air',eta:f.estimated_arrival_time||new Date(Date.now()+28800000).toISOString(),currentLat:f.latitude,currentLon:f.longitude,altitude_ft:f.altitude_ft,velocity_kt:f.velocity_kt,heading_deg:f.heading_deg});}
    else if(FLIGHT_DB[fn]){successAction(fn,FLIGHT_DB[fn]);}else{throw new Error('Not found');}
  }catch(e){if(FLIGHT_DB[fn]){successAction(fn,FLIGHT_DB[fn]);}else{showError('Flight not found.');}}
  loader.classList.remove('show');
});

document.addEventListener('visibilitychange',()=>{isPageVisible=document.visibilityState==='visible';if(isPageVisible&&currentFlightNum){fetchData();startSmoothAnimation();}});

if(window.location.pathname.includes('/track/'))loadFlightFromURL();
</script>
</body>
</html>
