<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlyerStats - Track Any Flight Globally</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#0ea5e9;--primary-glow:rgba(14,165,233,.5);--bg-dark:#0f172a;--glass:rgba(30,41,59,.7);--border:rgba(255,255,255,.1);--text:#f8fafc}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text);overflow:hidden;height:100vh;width:100vw}
#map{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
.search-overlay{position:absolute;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:center;align-items:flex-start;padding-top:3rem;transition:opacity .5s ease}
.search-container{width:100%;max-width:600px;text-align:center}
.hero-text{margin-bottom:1.5rem;opacity:0;animation:fadeInDown 1s ease forwards}
.hero-text h1{font-size:3rem;font-weight:700;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.hero-text p{color:#94a3b8;font-size:1.1rem}
.input-group{position:relative;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:.5rem;display:flex;align-items:center;box-shadow:0 20px 40px rgba(0,0,0,.4);transition:all .3s ease}
.input-group:focus-within{border-color:var(--primary);box-shadow:0 0 30px var(--primary-glow)}
.plane-icon-lg{font-size:1.5rem;margin-left:1rem;color:var(--primary)}
input{flex:1;background:transparent;border:none;padding:1rem;font-size:1.25rem;color:white;outline:none;font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:1px}
input::placeholder{color:rgba(255,255,255,.4);font-size:1rem}
.loader-inline{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;display:none;margin-right:1rem}
.loader-inline.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.tracker-ui{position:fixed;top:2rem;left:50%;transform:translateX(-50%) translateY(-150%);z-index:1000;width:100%;max-width:800px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;padding:1.5rem;display:flex;justify-content:space-between;align-items:center;box-shadow:0 10px 40px rgba(0,0,0,.5);transition:transform .6s cubic-bezier(.175,.885,.32,1.27);flex-wrap:wrap;gap:1rem}
.tracker-ui.visible{transform:translateX(-50%) translateY(0)}
.flight-info{display:flex;gap:2rem;align-items:center}
.flight-code{font-size:2rem;font-weight:700;color:white}
.route-badge{background:rgba(14,165,233,.2);color:var(--primary);padding:.5rem 1rem;border-radius:8px;font-weight:600;font-size:.9rem}
.status-dot{width:10px;height:10px;background:#10b981;border-radius:50%;box-shadow:0 0 10px #10b981;animation:pulse 1.5s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
.close-btn{background:transparent;border:none;color:#94a3b8;font-size:1.5rem;cursor:pointer;transition:color .2s}
.close-btn:hover{color:white}
.error-message{position:absolute;top:100%;left:0;right:0;color:#ef4444;font-size:.875rem;margin-top:.5rem;text-align:center;opacity:0;transition:opacity .3s ease}
.error-message.show{opacity:1}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.eta-container{background:linear-gradient(135deg,rgba(14,165,233,.1),rgba(139,92,246,.1));padding:1rem;border-radius:12px;margin:.5rem 0;border:1px solid rgba(255,255,255,.05);width:100%}
.eta-label{font-size:.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:1px}
.eta-time{font-size:1.5rem;font-weight:700;color:#fff;margin:.25rem 0}
.countdown{font-size:.9rem;color:#94a3b8}
.countdown.landing-soon{color:#f59e0b;font-weight:600}
.countdown.landed{color:#10b981;font-weight:600;text-transform:uppercase}
.data-status{display:flex;align-items:center;gap:.5rem;font-size:.75rem;margin-top:.5rem}
.status-dot-live{width:6px;height:6px;background:#10b981;border-radius:50%;box-shadow:0 0 6px #10b981;animation:statusPulse 1.5s infinite}
.status-dot-warning{background:#f59e0b;box-shadow:0 0 6px #f59e0b}
.status-dot-offline{background:#ef4444;box-shadow:0 0 6px #ef4444}
@keyframes statusPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}}
.animated-plane-marker{filter:drop-shadow(0 0 15px rgba(14,165,233,.8))}
#offlineBadge{display:none;position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:#f59e0b;color:white;padding:.5rem 1rem;border-radius:20px;font-size:.85rem;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.plane-popup .leaflet-popup-content-wrapper{background:#1e293b;color:#f8fafc;border-radius:12px;border:1px solid rgba(14,165,233,.3);box-shadow:0 10px 30px rgba(0,0,0,.5)}
.plane-popup .leaflet-popup-tip{background:#1e293b}
.popup-content{padding:1.25rem;min-width:220px}
.popup-header{font-size:1.1rem;font-weight:700;color:#0ea5e9;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.popup-row{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem}
.popup-row:last-child{border-bottom:none}
.popup-label{color:#94a3b8}
.popup-value{color:#f8fafc;font-weight:600}
@media(max-width:768px){.hero-text h1{font-size:2rem}.tracker-ui{flex-direction:column;gap:.5rem;align-items:flex-start;padding:1rem}.flight-code{font-size:1.5rem}}
</style>
</head>
<body>
<div id="map"></div>
<div class="search-overlay" id="searchOverlay"><div class="search-container"><div class="hero-text"><h1>FlyerStats</h1><p>Enter a flight number to track it globally.</p></div><div class="input-group"><span class="plane-icon-lg">✈️</span><input type="text" id="flightInput" placeholder="e.g. SQ321, BA117" autocomplete="off"><div class="loader-inline" id="loader"></div></div><div class="error-message" id="errorMessage">Flight not found.</div></div></div>
<div class="tracker-ui" id="trackerUI"><div class="status-dot"></div><div class="flight-info"><div class="flight-code" id="uiFlightCode">---</div><div class="route-badge" id="uiRoute">--- ➔ ---</div></div><div class="eta-container"><div class="eta-label">Estimated Arrival</div><div class="eta-time" id="etaTime">--:--</div><div class="countdown" id="countdown">Waiting...</div><div class="data-status"><div class="status-dot-live"></div><span id="dataFreshness">Connecting...</span></div></div><div style="display:flex;gap:.5rem;align-items:center;"><button onclick="shareFlight()" style="background:rgba(14,165,233,.2);color:#0ea5e9;border:none;padding:.5rem 1rem;border-radius:8px;font-weight:600;cursor:pointer;font-size:.85rem">🔗 Copy Link</button><button onclick="shareWhatsApp()" style="background:rgba(37,211,102,.2);color:#25d366;border:none;padding:.5rem 1rem;border-radius:8px;font-weight:600;cursor:pointer;font-size:.85rem">💬 WhatsApp</button><button class="close-btn" onclick="resetSearch()">✕</button></div></div>
<div id="offlineBadge">⚠️ Offline – Showing estimated position</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
